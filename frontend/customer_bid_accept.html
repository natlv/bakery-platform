<!doctype html>
<html lang="en" class="h-full">
 <head>
  <link rel="stylesheet" href="style.css">
  <script src="master_controller.js"></script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Compare Baking Offers</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <script src="/_sdk/element_sdk.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&amp;family=DM+Sans:wght@400;500;600&amp;display=swap" rel="stylesheet">
  <style>
    html, body { height: 100%; margin: 0; box-sizing: border-box; }
    * { box-sizing: border-box; }
    
    .flour-bg {
      background:
        radial-gradient(ellipse at 20% 50%, rgba(255,248,240,0.15) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 20%, rgba(210,180,140,0.1) 0%, transparent 40%),
        radial-gradient(circle at 60% 80%, rgba(255,255,255,0.08) 0%, transparent 30%),
        linear-gradient(135deg, #3e2723 0%, #4e342e 25%, #5d4037 50%, #4e342e 75%, #3e2723 100%);
    }
    
    .flour-dust {
      position: fixed; inset: 0; opacity: 0.12; pointer-events: none;
      background-image:
        radial-gradient(circle at 15% 25%, #fff 1px, transparent 1px),
        radial-gradient(circle at 45% 15%, #fff 0.5px, transparent 0.5px),
        radial-gradient(circle at 75% 35%, #fff 1.5px, transparent 1.5px),
        radial-gradient(circle at 25% 65%, #fff 0.8px, transparent 0.8px),
        radial-gradient(circle at 85% 75%, #fff 1px, transparent 1px),
        radial-gradient(circle at 55% 85%, #fff 0.6px, transparent 0.6px),
        radial-gradient(circle at 35% 45%, #fff 1.2px, transparent 1.2px),
        radial-gradient(circle at 65% 55%, #fff 0.7px, transparent 0.7px),
        radial-gradient(circle at 10% 80%, #fff 1px, transparent 1px),
        radial-gradient(circle at 90% 10%, #fff 0.9px, transparent 0.9px);
    }
    
    .wood-grain {
      position: fixed; inset: 0; opacity: 0.06; pointer-events: none;
      background: repeating-linear-gradient(
        2deg,
        transparent,
        transparent 8px,
        rgba(0,0,0,0.15) 8px,
        rgba(0,0,0,0.15) 9px
      );
    }
    
    .detail-container {
      background: rgba(255, 252, 247, 0.95);
      border: 1px solid rgba(200, 149, 108, 0.2);
      border-radius: 24px;
      box-shadow: 0 12px 32px rgba(62, 39, 35, 0.08);
    }
    
    .image-showcase {
      height: 320px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, rgba(200, 149, 108, 0.08), rgba(210, 180, 140, 0.08));
      font-size: 120px;
      border-radius: 20px;
      margin-bottom: 20px;
    }
    
    .badge {
      display: inline-block;
      padding: 6px 12px;
      border-radius: 10px;
      font-size: 12px;
      font-weight: 600;
      font-family: 'DM Sans', sans-serif;
      background: rgba(200, 149, 108, 0.12);
      color: #8d6e63;
      border: 1px solid rgba(200, 149, 108, 0.2);
    }
    
    .price-badge {
      background: linear-gradient(135deg, #c8956c, #a67c52);
      color: #fffaf5;
      padding: 10px 16px;
      font-size: 20px;
    }
    
    .form-input {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid rgba(200, 149, 108, 0.3);
      border-radius: 12px;
      font-family: 'DM Sans', sans-serif;
      color: #3e2723;
      font-size: 14px;
      background: rgba(255,255,255,0.8);
      transition: all 0.2s ease;
    }
    
    .form-input:focus {
      outline: none;
      border-color: #c8956c;
      background: #fffcf7;
      box-shadow: 0 0 0 3px rgba(200, 149, 108, 0.1);
    }
    
    .submit-btn {
      width: 100%;
      padding: 14px 24px;
      background: linear-gradient(135deg, #c8956c, #a67c52);
      color: #fffaf5;
      border: none;
      border-radius: 14px;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      box-shadow: 0 8px 20px rgba(200, 149, 108, 0.25);
    }
    
    .submit-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 28px rgba(200, 149, 108, 0.35);
    }
    
    .submit-btn:active {
      transform: translateY(0);
    }
    
    .bid-card {
      background: #fffcf7;
      border: 1px solid rgba(200, 149, 108, 0.15);
      border-radius: 16px;
      padding: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 24px;
      transition: all 0.3s ease;
      box-shadow: 0 2px 8px rgba(62, 39, 35, 0.04);
    }
    
    .bid-card:hover {
      border-color: rgba(200, 149, 108, 0.3);
      box-shadow: 0 8px 20px rgba(62, 39, 35, 0.08);
      transform: translateY(-2px);
    }
    
    .bid-card-left {
      flex: 1;
      display: flex;
      gap: 16px;
      align-items: center;
    }
    
    .baker-avatar {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: linear-gradient(135deg, #c8956c, #a67c52);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      flex-shrink: 0;
      box-shadow: 0 4px 12px rgba(200, 149, 108, 0.2);
    }
    
    .baker-info {
      flex: 1;
    }
    
    .baker-name {
      font-family: 'Playfair Display', serif;
      color: #3e2723;
      font-size: 16px;
      font-weight: 600;
      margin: 0 0 6px 0;
    }
    
    .baker-rating {
      font-family: 'DM Sans', sans-serif;
      color: #a1887f;
      font-size: 13px;
      margin: 0;
    }
    
    .bid-details {
      display: flex;
      gap: 32px;
      align-items: center;
    }
    
    .bid-detail-item {
      text-align: center;
    }
    
    .bid-detail-label {
      font-family: 'DM Sans', sans-serif;
      color: #a1887f;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin: 0 0 4px 0;
      font-weight: 600;
    }
    
    .bid-detail-value {
      font-family: 'Playfair Display', serif;
      color: #3e2723;
      font-size: 18px;
      font-weight: 600;
      margin: 0;
    }
    
    .accept-btn {
      padding: 12px 28px;
      background: linear-gradient(135deg, #c8956c, #a67c52);
      color: #fffaf5;
      border: none;
      border-radius: 12px;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      box-shadow: 0 6px 16px rgba(200, 149, 108, 0.2);
      white-space: nowrap;
      flex-shrink: 0;
    }
    
    .accept-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(200, 149, 108, 0.3);
    }
    
    .accept-btn:active {
      transform: translateY(0);
    }
    
    @keyframes slideInUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    .slide-up {
      animation: slideInUp 0.5s ease-out forwards;
    }
    
    .bid-card:nth-child(1) { animation-delay: 0.1s; }
    .bid-card:nth-child(2) { animation-delay: 0.2s; }
    .bid-card:nth-child(3) { animation-delay: 0.3s; }
    .bid-card:nth-child(4) { animation-delay: 0.4s; }
    
    @media (max-width: 768px) {
      .bid-card {
        flex-direction: column;
        align-items: flex-start;
      }
      
      .bid-details {
        width: 100%;
        flex-direction: column;
        align-items: flex-start;
        gap: 16px;
      }
      
      .accept-btn {
        width: 100%;
        text-align: center;
      }
    }
    
    @media (max-width: 768px) {
      .split-container {
        flex-direction: column !important;
      }
    }
  </style>
  <script src="/_sdk/data_sdk.js" type="text/javascript"></script>
 </head>
 <body class="h-full">
  <div id="app" class="flour-bg h-full w-full flex flex-col relative overflow-auto">
   <div class="flour-dust"></div>
   <div class="wood-grain"></div><!-- Header -->
   <div style="background: rgba(255, 252, 247, 0.8); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(200, 149, 108, 0.1); padding: 32px 0; position: sticky; top: 0; z-index: 20;">
    <div class="w-full px-6 relative z-10">
     <div class="w-full max-w-4xl mx-auto">
      <h1 id="comparison-heading" style="font-family: 'Playfair Display', serif; color: #3e2723; font-size: 32px; font-weight: 600; margin: 0 0 8px 0; line-height: 1.2;">Compare Baking Offers</h1>
      <p id="comparison-subtitle" style="font-family: 'DM Sans', sans-serif; color: #a1887f; font-size: 15px; margin: 0;">Review proposals from skilled bakers</p>
     </div>
    </div>
   </div><!-- Main Content -->
   <div class="flex-1 w-full px-6 py-12 relative z-10">
    <div class="w-full max-w-4xl mx-auto">
     <div id="bids-container" style="display: flex; flex-direction: column; gap: 16px;"></div>
    </div>
   </div>
  </div>
<script>
    // 1. Sample data remains the same
    const bids = [
      { id: 1, name: "Sarah's Creations", emoji: "👩‍🍳", rating: "4.9", reviews: 127, price: 420, timeline: "2 weeks" },
      { id: 2, name: "Artisan Bakery Co", emoji: "🎂", rating: "4.8", reviews: 89, price: 450, timeline: "3 weeks" },
      { id: 3, name: "The Cake Studio", emoji: "🧁", rating: "5.0", reviews: 156, price: 520, timeline: "1 week" },
      { id: 4, name: "Homemade Delights", emoji: "🍰", rating: "4.7", reviews: 64, price: 380, timeline: "10 days" }
    ];
    
    // 2. Rendering function (simplified for reliability)
    function renderBids() {
      const container = document.getElementById('bids-container');
      if (!container) return;
      container.innerHTML = '';
      
      bids.forEach((bid) => {
        const bidCard = document.createElement('div');
        bidCard.className = 'bid-card slide-up';
        
        bidCard.innerHTML = `
          <div class="bid-card-left">
            <div class="baker-avatar">${bid.emoji}</div>
            <div class="baker-info">
              <p class="baker-name">${bid.name}</p>
              <p class="baker-rating">⭐ ${bid.rating} (${bid.reviews} reviews)</p>
            </div>
          </div>
          <div class="bid-details">
            <div class="bid-detail-item">
              <p class="bid-detail-label">Bid Price</p>
              <p class="bid-detail-value">$${bid.price}</p>
            </div>
            <div class="bid-detail-item">
              <p class="bid-detail-label">Timeline</p>
              <p class="bid-detail-value">${bid.timeline}</p>
            </div>
          </div>
          <button class="accept-btn" onclick="handleAcceptBid(${bid.id}, '${bid.name}')">Accept Bid</button>
        `;
        container.appendChild(bidCard);
      });
    }
    
    function handleAcceptBid(bidId, bakerName) {
      const container = document.getElementById('bids-container');
      container.innerHTML = `
        <div style="padding: 30px; background: rgba(200, 149, 108, 0.1); border: 1px solid rgba(200, 149, 108, 0.3); border-radius: 12px; text-align: center;">
          <p style="font-family: 'Playfair Display', serif; color: #3e2723; font-size: 20px; font-weight: 600;">✓ Bid Accepted!</p>
          <p style="font-family: 'DM Sans', sans-serif; color: #a1887f; font-size: 16px; margin-top: 8px;">Success! ${bakerName} has been notified.</p>
        </div>
      `;
    }

    // 3. Robust Initialization
    document.addEventListener('DOMContentLoaded', () => {
      // Force render regardless of SDK
      renderPortfolio = renderBids; // Alias for safety
      renderBids();

      // Defensive SDK Init (Wrap in try/catch)
      if (window.elementSdk && typeof window.elementSdk.init === 'function') {
        try {
          window.elementSdk.init({
            defaultConfig: { accept_btn_text: "Accept Bid" },
            onConfigChange: (cfg) => {
               if(cfg.accept_btn_text) {
                 document.querySelectorAll('.accept-btn').forEach(b => b.textContent = cfg.accept_btn_text);
               }
            }
          });
        } catch (e) {
          console.warn("Element SDK failed, but bids should still be visible.");
        }
      }
    });
</script>

</html>
