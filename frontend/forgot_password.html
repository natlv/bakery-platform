<!doctype html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart Bakers — Forgot Password</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    html,body{height:100%;margin:0;}*{box-sizing:border-box;}
    .flour-bg{background:radial-gradient(ellipse at 20% 50%,rgba(255,248,240,.15) 0%,transparent 50%),linear-gradient(135deg,#3d2b1f 0%,#5c3d2e 30%,#4a3228 60%,#6b4636 100%);}
    .glass{background:rgba(255,252,247,.93);backdrop-filter:blur(24px);border:1px solid rgba(255,255,255,.6);}
    .inp{width:100%;padding:12px 16px;border:1px solid rgba(200,149,108,.3);border-radius:12px;font-family:'DM Sans',sans-serif;color:#3d2b1f;font-size:14px;background:rgba(255,255,255,.7);outline:none;transition:all .2s;}
    .inp:focus{border-color:#c8956c;box-shadow:0 0 0 3px rgba(200,149,108,.12);}
    .btn-primary{width:100%;padding:14px;background:linear-gradient(135deg,#b47846,#8d5e30);color:#fffaf5;border:none;border-radius:14px;font-family:'DM Sans',sans-serif;font-size:15px;font-weight:600;cursor:pointer;transition:all .3s cubic-bezier(.34,1.56,.64,1);box-shadow:0 8px 20px rgba(180,120,70,.25);}
    .btn-primary:hover{transform:translateY(-2px);box-shadow:0 12px 28px rgba(180,120,70,.35);}
    @keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
    .a1{animation:fadeUp .6s ease-out .05s both}.a2{animation:fadeUp .6s ease-out .15s both}.a3{animation:fadeUp .6s ease-out .25s both}.a4{animation:fadeUp .6s ease-out .35s both}
  </style>
</head>
<body class="h-full">
<main class="flour-bg relative w-full h-full flex items-center justify-center overflow-auto p-4">
  <div class="glass a1 relative z-10 rounded-3xl shadow-2xl px-8 py-10 w-full max-w-md mx-auto">

    <div class="a1 flex justify-center mb-4">
      <div style="width:56px;height:56px;background:linear-gradient(135deg,#b47846,#8d5e30);border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:26px;">🔑</div>
    </div>

    <h1 class="a2 text-center" style="font-family:'Playfair Display',serif;font-size:26px;font-weight:700;color:#3d2b1f;margin-bottom:8px;">Forgot Password?</h1>
    <p class="a2 text-center" style="font-family:'DM Sans',sans-serif;font-size:14px;color:#8b7355;margin-bottom:28px;">Enter your email and we'll send you a reset link.</p>

    <div id="form-section" class="a3">
      <div style="margin-bottom:20px;">
        <label style="font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;color:#3d2b1f;display:block;margin-bottom:6px;">Email Address</label>
        <input class="inp" type="email" id="reset-email" placeholder="you@example.com">
        <p id="email-err" style="color:#e53935;font-family:'DM Sans',sans-serif;font-size:12px;margin-top:4px;display:none;">Please enter a valid email.</p>
      </div>
      <button class="btn-primary a4" onclick="handleReset()">Send Reset Link</button>
    </div>

    <div id="success-section" style="display:none;text-align:center;" class="a3">
      <div style="font-size:48px;margin-bottom:16px;">📬</div>
      <h2 style="font-family:'Playfair Display',serif;color:#3d2b1f;font-size:20px;font-weight:600;margin-bottom:8px;">Check your inbox!</h2>
      <p style="font-family:'DM Sans',sans-serif;color:#8b7355;font-size:14px;line-height:1.6;">We sent a password reset link to <strong id="sent-email" style="color:#b47846;"></strong>. Check your spam folder if you don't see it.</p>
      <a href="reset_password.html" style="display:block;margin-top:20px;padding:12px;background:rgba(180,120,70,.1);border:1px solid rgba(180,120,70,.2);border-radius:12px;color:#b47846;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;text-decoration:none;">Continue to Reset Password →</a>
    </div>

    <div class="text-center mt-6">
      <a href="login.html" style="font-family:'DM Sans',sans-serif;font-size:13px;color:#b47846;text-decoration:none;font-weight:600;">← Back to Sign In</a>
    </div>
  </div>
</main>
<script>
  async function handleReset() {
    const email = document.getElementById('reset-email').value.trim();
    document.getElementById('email-err').style.display = 'none';
    if (!email || !email.includes('@')) {
      document.getElementById('email-err').style.display = 'block';
      return;
    }
    // In production: POST /api/auth/forgot-password { email }
    try {
        const result = await SmartBakers.api.forgotPassword(email);

        document.getElementById('form-section').style.display = 'none';
        document.getElementById('sent-email').textContent = email;
        document.getElementById('success-section').style.display = 'block';
        
        setTimeout(() => {
            window.location.href = `reset_password_final.html?user_id=${result.user_id}`;
        }, 2000)
    } catch (err) {
        alert(err.message); 
    }

  }
  document.addEventListener('keydown', e => { if(e.key==='Enter') handleReset(); });
}
    
</script>
</body>
</html>
