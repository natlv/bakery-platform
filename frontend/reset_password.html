<!doctype html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart Bakers — Reset Password</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    html,body{height:100%;margin:0;}*{box-sizing:border-box;}
    .flour-bg{background:radial-gradient(ellipse at 20% 50%,rgba(255,248,240,.15) 0%,transparent 50%),linear-gradient(135deg,#3d2b1f 0%,#5c3d2e 30%,#4a3228 60%,#6b4636 100%);}
    .glass{background:rgba(255,252,247,.93);backdrop-filter:blur(24px);border:1px solid rgba(255,255,255,.6);}
    .inp{width:100%;padding:12px 16px;border:1px solid rgba(200,149,108,.3);border-radius:12px;font-family:'DM Sans',sans-serif;color:#3d2b1f;font-size:14px;background:rgba(255,255,255,.7);outline:none;transition:all .2s;}
    .inp:focus{border-color:#c8956c;box-shadow:0 0 0 3px rgba(200,149,108,.12);}
    .btn-primary{width:100%;padding:14px;background:linear-gradient(135deg,#b47846,#8d5e30);color:#fffaf5;border:none;border-radius:14px;font-family:'DM Sans',sans-serif;font-size:15px;font-weight:600;cursor:pointer;transition:all .3s;box-shadow:0 8px 20px rgba(180,120,70,.25);}
    .btn-primary:hover{transform:translateY(-2px);}
    .strength-bar{height:4px;border-radius:2px;transition:all .3s;margin-top:6px;}
    @keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
    .a1{animation:fadeUp .6s ease-out .05s both}.a2{animation:fadeUp .6s ease-out .15s both}.a3{animation:fadeUp .6s ease-out .25s both}.a4{animation:fadeUp .6s ease-out .35s both}
  </style>
</head>
<body class="h-full">
<main class="flour-bg relative w-full h-full flex items-center justify-center overflow-auto p-4">
  <div class="glass a1 relative z-10 rounded-3xl shadow-2xl px-8 py-10 w-full max-w-md mx-auto">

    <div class="a1 flex justify-center mb-4">
      <div style="width:56px;height:56px;background:linear-gradient(135deg,#b47846,#8d5e30);border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:26px;">🔒</div>
    </div>

    <h1 class="a2 text-center" style="font-family:'Playfair Display',serif;font-size:26px;font-weight:700;color:#3d2b1f;margin-bottom:8px;">Set New Password</h1>
    <p class="a2 text-center" style="font-family:'DM Sans',sans-serif;font-size:14px;color:#8b7355;margin-bottom:28px;">Choose a strong password for your account.</p>

    <div id="form-section" class="a3">
      <div style="margin-bottom:16px;">
        <label style="font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;color:#3d2b1f;display:block;margin-bottom:6px;">New Password</label>
        <div style="position:relative;">
          <input class="inp" type="password" id="new-pwd" placeholder="••••••••" oninput="checkStrength()" style="padding-right:44px;">
          <button onclick="togglePwd('new-pwd')" style="position:absolute;right:14px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:#a1887f;">👁</button>
        </div>
        <div id="strength-bar" class="strength-bar" style="background:#e0e0e0;width:0%;"></div>
        <p id="strength-label" style="font-family:'DM Sans',sans-serif;font-size:11px;color:#a1887f;margin-top:4px;"></p>
      </div>
      <div style="margin-bottom:24px;">
        <label style="font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;color:#3d2b1f;display:block;margin-bottom:6px;">Confirm Password</label>
        <div style="position:relative;">
          <input class="inp" type="password" id="confirm-pwd" placeholder="••••••••" style="padding-right:44px;">
          <button onclick="togglePwd('confirm-pwd')" style="position:absolute;right:14px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:#a1887f;">👁</button>
        </div>
        <p id="match-err" style="color:#e53935;font-family:'DM Sans',sans-serif;font-size:12px;margin-top:4px;display:none;">Passwords do not match.</p>
      </div>
      <button class="btn-primary a4" onclick="handleReset()">Reset Password</button>
    </div>

    <div id="success-section" style="display:none;text-align:center;">
      <div style="font-size:48px;margin-bottom:16px;">✅</div>
      <h2 style="font-family:'Playfair Display',serif;color:#3d2b1f;font-size:20px;font-weight:600;margin-bottom:8px;">Password Updated!</h2>
      <p style="font-family:'DM Sans',sans-serif;color:#8b7355;font-size:14px;margin-bottom:20px;">Your password has been reset successfully. You can now sign in.</p>
      <a href="login.html" style="display:block;padding:14px;background:linear-gradient(135deg,#b47846,#8d5e30);color:#fffaf5;border-radius:14px;font-family:'DM Sans',sans-serif;font-size:15px;font-weight:600;text-decoration:none;">Go to Sign In →</a>
    </div>

    <div class="text-center mt-6">
      <a href="login.html" style="font-family:'DM Sans',sans-serif;font-size:13px;color:#b47846;text-decoration:none;font-weight:600;">← Back to Sign In</a>
    </div>
  </div>
</main>
<script>
  function togglePwd(id) {
    const el = document.getElementById(id);
    el.type = el.type === 'password' ? 'text' : 'password';
  }
  function checkStrength() {
    const pwd = document.getElementById('new-pwd').value;
    const bar = document.getElementById('strength-bar');
    const lbl = document.getElementById('strength-label');
    let score = 0;
    if (pwd.length >= 8) score++;
    if (/[A-Z]/.test(pwd)) score++;
    if (/[0-9]/.test(pwd)) score++;
    if (/[^A-Za-z0-9]/.test(pwd)) score++;
    const levels = [
      {w:'0%', c:'#e0e0e0', t:''},
      {w:'25%', c:'#e53935', t:'Weak'},
      {w:'50%', c:'#e08a2e', t:'Fair'},
      {w:'75%', c:'#fdd835', t:'Good'},
      {w:'100%', c:'#6b8f5e', t:'Strong'},
    ];
    const lvl = levels[score] || levels[0];
    bar.style.width = lvl.w;
    bar.style.background = lvl.c;
    lbl.textContent = lvl.t;
    lbl.style.color = lvl.c;
  }
  async function handleReset() {
    const pwd = document.getElementById('new-pwd').value;
    const confirm = document.getElementById('confirm-pwd').value;
    document.getElementById('match-err').style.display = 'none';
    if (pwd.length < 6) { alert('Password must be at least 6 characters.'); return; }
    if (pwd !== confirm) { document.getElementById('match-err').style.display = 'block'; return; }
    // In production: POST /api/auth/reset-password { token: urlParam, newPassword: pwd }

    const urlParams = new URLSearchParams(window.location.search);
    const userId = urlParams.get('user_id');

    if (!userId) {
        alert("Invalid reset link. Please try again from the forgot password page.");
        return;
    }

    try {
        await SmartBakers.api.resetPassword(parseInt(userId), pwd);

        document.getElementById('form-section').style.display = 'none';
        document.getElementById('success-section').style.display = 'block';
        alert("Success! Your password has been updated.");
        
        setTimeout(() => {
            window.location.href = 'login.html';
        }, 2000);
    } catch (err) {
        alert(err.message || "Failed to reset password.");
    }
  }
</script>
</body>
</html>
