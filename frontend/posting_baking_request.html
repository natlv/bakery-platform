<!doctype html>
<html lang="en" class="h-full">
 <head>
  <script src="master_controller.js"></script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Post a Baking Request</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <script src="/_sdk/element_sdk.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&amp;family=DM+Sans:wght@400;500;600&amp;display=swap" rel="stylesheet">
  <style>
    html, body { height: 100%; margin: 0; }
    .flour-bg {
      background:
        radial-gradient(ellipse at 20% 50%, rgba(255,248,240,0.15) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 20%, rgba(210,180,140,0.1) 0%, transparent 40%),
        radial-gradient(circle at 60% 80%, rgba(255,255,255,0.08) 0%, transparent 30%),
        linear-gradient(135deg, #3e2723 0%, #4e342e 25%, #5d4037 50%, #4e342e 75%, #3e2723 100%);
    }
    .flour-dust {
      position: absolute; inset: 0; opacity: 0.12;
      background-image:
        radial-gradient(circle at 15% 25%, #fff 1px, transparent 1px),
        radial-gradient(circle at 45% 15%, #fff 0.5px, transparent 0.5px),
        radial-gradient(circle at 75% 35%, #fff 1.5px, transparent 1.5px),
        radial-gradient(circle at 25% 65%, #fff 0.8px, transparent 0.8px),
        radial-gradient(circle at 85% 75%, #fff 1px, transparent 1px),
        radial-gradient(circle at 55% 85%, #fff 0.6px, transparent 0.6px),
        radial-gradient(circle at 35% 45%, #fff 1.2px, transparent 1.2px),
        radial-gradient(circle at 65% 55%, #fff 0.7px, transparent 0.7px),
        radial-gradient(circle at 10% 80%, #fff 1px, transparent 1px),
        radial-gradient(circle at 90% 10%, #fff 0.9px, transparent 0.9px);
      pointer-events: none;
    }
    .wood-grain {
      position: absolute; inset: 0; opacity: 0.06;
      background: repeating-linear-gradient(
        2deg,
        transparent,
        transparent 8px,
        rgba(0,0,0,0.15) 8px,
        rgba(0,0,0,0.15) 9px
      );
      pointer-events: none;
    }
    .glass-card {
      background: rgba(255, 252, 247, 0.92);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.6);
    }
    .toggle-track {
      transition: background-color 0.3s ease;
    }
    .toggle-thumb {
      transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    @keyframes floatIn {
      from { opacity: 0; transform: translateY(24px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .float-in { animation: floatIn 0.7s ease-out forwards; }
    .float-in-d1 { animation: floatIn 0.7s 0.1s ease-out forwards; opacity: 0; }
    .float-in-d1a { animation: floatIn 0.7s 0.15s ease-out forwards; opacity: 0; }
    .float-in-d2 { animation: floatIn 0.7s 0.2s ease-out forwards; opacity: 0; }
    .float-in-d3 { animation: floatIn 0.7s 0.3s ease-out forwards; opacity: 0; }
    .float-in-d4 { animation: floatIn 0.7s 0.4s ease-out forwards; opacity: 0; }
    .float-in-d5 { animation: floatIn 0.7s 0.5s ease-out forwards; opacity: 0; }
    .upload-dashed {
      border: 2px dashed #c8956c;
      transition: all 0.3s ease;
    }
    .upload-dashed:hover {
      border-color: #a67c52;
      background: rgba(200, 149, 108, 0.05);
    }
    .upload-dashed.drag-over {
      border-color: #a67c52;
      background: rgba(200, 149, 108, 0.1);
    }
    input[type="text"],
    input[type="number"],
    input[type="date"],
    select {
      font-family: 'DM Sans', sans-serif;
    }
  
  </style>
  <style>body { box-sizing: border-box; }</style>
  <script src="/_sdk/data_sdk.js" type="text/javascript"></script>
 </head>
 <body class="h-full">
  <div id="app" class="flour-bg h-full w-full flex items-center justify-center p-4 relative overflow-auto">
   <div class="flour-dust"></div>
   <div class="wood-grain"></div>
   <div class="glass-card rounded-3xl shadow-2xl w-full max-w-2xl p-10 relative z-10"><!-- Header -->
    <div class="mb-8 float-in">
     <h1 id="form-heading" class="font-bold" style="font-family: 'Playfair Display', serif; color: #3e2723; font-size: 32px;">Post a Baking Request</h1>
     <p style="font-family: 'DM Sans', sans-serif; color: #8d6e63; font-size: 14.4px; margin-top: 8px;">Share your cake vision and connect with talented bakers</p>
    </div><!-- Form -->
    <form id="baking-form" onsubmit="handleSubmit(event)"><!-- Cake Title -->
     <div class="mb-6 float-in-d1"><label id="cake-title-label" style="font-family: 'DM Sans', sans-serif; color: #3e2723; font-size: 14px; font-weight: 600; display: block; margin-bottom: 6px;">Cake Title</label> <input type="text" id="cake-title" placeholder="e.g., Chocolate Wedding Cake" style="width: 100%; padding: 12px 16px; border: 1px solid #e8dbd0; border-radius: 12px; color: #3e2723; font-size: 14px; background: rgba(255,255,255,0.6);" required>
     </div><!-- Bake Variety & Dietary Options Row -->
     <div class="grid grid-cols-2 gap-6 mb-6 float-in-d1a"><!-- Bake Variety -->
      <div><label id="variety-label" style="font-family: 'DM Sans', sans-serif; color: #3e2723; font-size: 14px; font-weight: 600; display: block; margin-bottom: 6px;">Bake Variety</label> <select id="bake-variety" style="width: 100%; padding: 12px 16px; border: 1px solid #e8dbd0; border-radius: 12px; color: #3e2723; font-size: 14px; background: rgba(255,255,255,0.6);" required> <option value="">Select bake variety</option> <option value="bread">Bread</option> <option value="birthday-cake">Birthday Cake</option> <option value="wedding-cake">Wedding Cake</option> <option value="anniversary-cake">Anniversary Cake</option> <option value="occasion-cake">Occasion Cake</option> <option value="cookies">Cookies</option> <option value="biscuit">Biscuit</option> <option value="pastry">Pastry</option> <option value="cupcakes">Cupcakes</option> </select>
      </div><!-- Dietary Options -->
      <div><label id="dietary-label" style="font-family: 'DM Sans', sans-serif; color: #3e2723; font-size: 14px; font-weight: 600; display: block; margin-bottom: 6px;">Dietary Options</label> <select id="dietary-options" multiple style="width: 100%; padding: 12px 16px; border: 1px solid #e8dbd0; border-radius: 12px; color: #3e2723; font-size: 14px; background: rgba(255,255,255,0.6); min-height: 100px;"> <option value="vegan">Vegan</option> <option value="non-vegan">Non-Vegan</option> <option value="gluten-free">Gluten Free</option> <option value="halal">Halal</option> <option value="non-halal">Non-Halal</option> <option value="sugar-control">Sugar Control</option> <option value="dairy-free">Dairy Free</option> <option value="nut-free">Nut Free</option> </select>
       <p style="font-family: 'DM Sans', sans-serif; color: #a1887f; font-size: 12px; margin-top: 4px;">Hold Ctrl/Cmd to select multiple options</p>
      </div>
     </div><!-- Budget & Deadline Row -->
     <div class="grid grid-cols-2 gap-6 mb-6 float-in-d2"><!-- Budget -->
      <div><label id="budget-label" style="font-family: 'DM Sans', sans-serif; color: #3e2723; font-size: 14px; font-weight: 600; display: block; margin-bottom: 6px;">Budget ($)</label> <input type="number" id="budget" placeholder="500" min="0" step="0.01" style="width: 100%; padding: 12px 16px; border: 1px solid #e8dbd0; border-radius: 12px; color: #3e2723; font-size: 14px; background: rgba(255,255,255,0.6);" required>
      </div><!-- Deadline -->
      <div><label id="deadline-label" style="font-family: 'DM Sans', sans-serif; color: #3e2723; font-size: 14px; font-weight: 600; display: block; margin-bottom: 6px;">Deadline Date</label> <input type="date" id="deadline" style="width: 100%; padding: 12px 16px; border: 1px solid #e8dbd0; border-radius: 12px; color: #3e2723; font-size: 14px; background: rgba(255,255,255,0.6);" required>
      </div>
     </div><!-- Upload Area -->
     <div class="mb-8 float-in-d3"><label style="font-family: 'DM Sans', sans-serif; color: #3e2723; font-size: 14px; font-weight: 600; display: block; margin-bottom: 10px;">Inspiration Photos</label>
      <div id="upload-area" class="upload-dashed rounded-2xl p-8 text-center cursor-pointer transition-all" style="background: rgba(240, 230, 218, 0.5);"><i data-lucide="cloud-upload" style="width: 40px; height: 40px; margin: 0 auto 12px; color: #c8956c;"></i>
       <p id="upload-prompt" style="font-family: 'DM Sans', sans-serif; color: #3e2723; font-size: 15px; font-weight: 500;">Drag &amp; drop your photos here</p>
       <p style="font-family: 'DM Sans', sans-serif; color: #a1887f; font-size: 13px; margin-top: 4px;">or click to browse</p><input type="file" id="file-input" multiple accept="image/*" style="display: none;">
      </div>
      <div id="file-preview" class="mt-4 grid grid-cols-2 gap-3" style="display: none;"></div>
     </div><!-- Submit Button -->
     <div class="float-in-d4"><button type="submit" id="submit-btn" class="w-full py-4 rounded-2xl font-semibold text-base transition-all duration-200 hover:shadow-lg hover:scale-[1.02] active:scale-[0.98]" style="font-family: 'DM Sans', sans-serif; background: #c8956c; color: #fffaf5;"> Post Request </button>
     </div><!-- Success Message -->
     <div id="success-msg" class="hidden mt-6 p-4 rounded-2xl text-center float-in-d5" style="background: rgba(200, 149, 108, 0.15); border: 1px solid rgba(200, 149, 108, 0.3);">
      <p style="font-family: 'Playfair Display', serif; color: #3e2723; font-size: 18px; font-weight: 600;">✨ Request Posted!</p>
      <p style="font-family: 'DM Sans', sans-serif; color: #8d6e63; font-size: 13px; margin-top: 4px;">Bakers will start bidding on your cake soon.</p>
     </div>
    </form>
   </div>
  </div>
  <script>
    const uploadArea = document.getElementById('upload-area');
    const fileInput = document.getElementById('file-input');
    const filePreview = document.getElementById('file-preview');

    // Upload area click
    uploadArea.addEventListener('click', () => fileInput.click());

    // Drag and drop
    ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
      uploadArea.addEventListener(eventName, preventDefaults, false);
    });

    function preventDefaults(e) {
      e.preventDefault();
      e.stopPropagation();
    }

    uploadArea.addEventListener('dragenter', () => uploadArea.classList.add('drag-over'));
    uploadArea.addEventListener('dragleave', () => uploadArea.classList.remove('drag-over'));
    uploadArea.addEventListener('drop', (e) => {
      uploadArea.classList.remove('drag-over');
      const dt = e.dataTransfer;
      const files = dt.files;
      fileInput.files = files;
      displayFiles(files);
    });

    fileInput.addEventListener('change', (e) => {
      displayFiles(e.target.files);
    });

    function displayFiles(files) {
      filePreview.innerHTML = '';
      if (files.length > 0) {
        filePreview.style.display = 'grid';
        [...files].forEach(file => {
          const reader = new FileReader();
          reader.onload = (e) => {
            const div = document.createElement('div');
            div.style.position = 'relative';
            div.style.borderRadius = '12px';
            div.style.overflow = 'hidden';
            div.style.aspectRatio = '1';
            div.innerHTML = `
              <img src="${e.target.result}" style="width: 100%; height: 100%; object-fit: cover;">
              <button type="button" class="remove-file" style="position: absolute; top: 4px; right: 4px; background: rgba(0,0,0,0.5); color: white; border: none; width: 24px; height: 24px; border-radius: 6px; cursor: pointer; font-size: 12px; display: flex; align-items: center; justify-center;">×</button>
            `;
            div.querySelector('.remove-file').addEventListener('click', (ev) => {
              ev.preventDefault();
              const dt = new DataTransfer();
              [...fileInput.files].forEach((f, i) => {
                if (f !== file) dt.items.add(f);
              });
              fileInput.files = dt.files;
              displayFiles(fileInput.files);
            });
            filePreview.appendChild(div);
          };
          reader.readAsDataURL(file);
        });
      } else {
        filePreview.style.display = 'none';
      }
    }

    function handleSubmit(e) {
      e.preventDefault();
      document.getElementById('baking-form').style.display = 'none';
      document.getElementById('success-msg').classList.remove('hidden');
    }

    // Element SDK
    const defaultConfig = {
      form_heading: 'Post a Baking Request',
      cake_title_label: 'Cake Title',
      variety_label: 'Bake Variety',
      dietary_label: 'Dietary Options',
      budget_label: 'Budget ($)',
      deadline_label: 'Deadline Date',
      upload_prompt: 'Drag & drop your photos here',
      submit_btn_text: 'Post Request',
      font_family: 'Playfair Display',
      font_size: 16,
      background_color: '#3e2723',
      surface_color: '#fffcf7',
      text_color: '#3e2723',
      primary_action: '#c8956c',
      secondary_action: '#8d6e63'
    };

    function applyConfig(config) {
      const c = { ...defaultConfig, ...config };
      const font = c.font_family || defaultConfig.font_family;
      const baseSize = c.font_size || defaultConfig.font_size;

      document.getElementById('form-heading').textContent = c.form_heading;
      document.getElementById('form-heading').style.fontSize = `${baseSize * 2}px`;
      document.getElementById('form-heading').style.color = c.text_color;

      document.getElementById('cake-title-label').textContent = c.cake_title_label;
      document.getElementById('cake-title-label').style.color = c.text_color;
      document.getElementById('cake-title-label').style.fontSize = `${baseSize * 0.9}px`;

      document.getElementById('variety-label').textContent = c.variety_label;
      document.getElementById('variety-label').style.color = c.text_color;
      document.getElementById('variety-label').style.fontSize = `${baseSize * 0.9}px`;

      document.getElementById('dietary-label').textContent = c.dietary_label;
      document.getElementById('dietary-label').style.color = c.text_color;
      document.getElementById('dietary-label').style.fontSize = `${baseSize * 0.9}px`;

      document.getElementById('budget-label').textContent = c.budget_label;
      document.getElementById('budget-label').style.color = c.text_color;
      document.getElementById('budget-label').style.fontSize = `${baseSize * 0.9}px`;

      document.getElementById('deadline-label').textContent = c.deadline_label;
      document.getElementById('deadline-label').style.color = c.text_color;
      document.getElementById('deadline-label').style.fontSize = `${baseSize * 0.9}px`;

      document.getElementById('upload-prompt').textContent = c.upload_prompt;
      document.getElementById('upload-prompt').style.fontSize = `${baseSize * 0.95}px`;

      document.getElementById('submit-btn').textContent = c.submit_btn_text;
      document.getElementById('submit-btn').style.background = c.primary_action;
      document.getElementById('submit-btn').style.color = c.surface_color;

      document.querySelectorAll('input[type="text"], input[type="number"], input[type="date"]').forEach(el => {
        el.style.borderColor = c.secondary_action;
        el.style.color = c.text_color;
      });

      document.querySelectorAll('select').forEach(el => {
        el.style.borderColor = c.secondary_action;
        el.style.color = c.text_color;
      });

      document.querySelectorAll('.glass-card').forEach(el => {
        el.style.background = `${c.surface_color}ee`;
      });

      document.getElementById('upload-area').style.borderColor = c.primary_action;
      document.querySelector('[data-lucide="cloud-upload"]').style.color = c.primary_action;
    }

    window.elementSdk.init({
      defaultConfig,
      onConfigChange: async (config) => applyConfig(config),
      mapToCapabilities: (config) => ({
        recolorables: [
          { get: () => config.background_color || defaultConfig.background_color, set: (v) => { config.background_color = v; window.elementSdk.setConfig({ background_color: v }); } },
          { get: () => config.surface_color || defaultConfig.surface_color, set: (v) => { config.surface_color = v; window.elementSdk.setConfig({ surface_color: v }); } },
          { get: () => config.text_color || defaultConfig.text_color, set: (v) => { config.text_color = v; window.elementSdk.setConfig({ text_color: v }); } },
          { get: () => config.primary_action || defaultConfig.primary_action, set: (v) => { config.primary_action = v; window.elementSdk.setConfig({ primary_action: v }); } },
          { get: () => config.secondary_action || defaultConfig.secondary_action, set: (v) => { config.secondary_action = v; window.elementSdk.setConfig({ secondary_action: v }); } }
        ],
        borderables: [],
        fontEditable: {
          get: () => config.font_family || defaultConfig.font_family,
          set: (v) => { config.font_family = v; window.elementSdk.setConfig({ font_family: v }); }
        },
        fontSizeable: {
          get: () => config.font_size || defaultConfig.font_size,
          set: (v) => { config.font_size = v; window.elementSdk.setConfig({ font_size: v }); }
        }
      }),
      mapToEditPanelValues: (config) => new Map([
        ['form_heading', config.form_heading || defaultConfig.form_heading],
        ['cake_title_label', config.cake_title_label || defaultConfig.cake_title_label],
        ['variety_label', config.variety_label || defaultConfig.variety_label],
        ['dietary_label', config.dietary_label || defaultConfig.dietary_label],
        ['budget_label', config.budget_label || defaultConfig.budget_label],
        ['deadline_label', config.deadline_label || defaultConfig.deadline_label],
        ['upload_prompt', config.upload_prompt || defaultConfig.upload_prompt],
        ['submit_btn_text', config.submit_btn_text || defaultConfig.submit_btn_text]
      ])
    });

    lucide.createIcons();
  </script>

</html>
