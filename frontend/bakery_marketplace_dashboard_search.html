<!doctype html>
<html lang="en" class="h-full">
 <head>
  <link rel="stylesheet" href="style.css">
  <script src="master_controller.js"></script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bakery Request Marketplace</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <script>window.elementSdk = window.elementSdk || { init: () => console.log("SDK Mock Init") };</script>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&amp;family=DM+Sans:wght@400;500;600&amp;display=swap" rel="stylesheet">
  <style>
    html, body { height: 100%; margin: 0; box-sizing: border-box; }
    * { box-sizing: border-box; }
    
    .flour-bg {
      background:
        radial-gradient(ellipse at 20% 50%, rgba(255,248,240,0.15) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 20%, rgba(210,180,140,0.1) 0%, transparent 40%),
        radial-gradient(circle at 60% 80%, rgba(255,255,255,0.08) 0%, transparent 30%),
        linear-gradient(135deg, #3e2723 0%, #4e342e 25%, #5d4037 50%, #4e342e 75%, #3e2723 100%);
    }
    
    .flour-dust {
      position: fixed; inset: 0; opacity: 0.12; pointer-events: none;
      background-image:
        radial-gradient(circle at 15% 25%, #fff 1px, transparent 1px),
        radial-gradient(circle at 45% 15%, #fff 0.5px, transparent 0.5px),
        radial-gradient(circle at 75% 35%, #fff 1.5px, transparent 1.5px),
        radial-gradient(circle at 25% 65%, #fff 0.8px, transparent 0.8px);
    }
    
    .wood-grain {
      position: fixed; inset: 0; opacity: 0.06; pointer-events: none;
      background: repeating-linear-gradient(2deg, transparent, transparent 8px, rgba(0,0,0,0.15) 8px, rgba(0,0,0,0.15) 9px);
    }
    
    .glass-card {
      background: rgba(255, 252, 247, 0.92);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.6);
    }
    
    .request-card {
      background: rgba(255, 252, 247, 0.95);
      border: 1px solid rgba(200, 149, 108, 0.2);
      transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      opacity: 0; /* Handled by animation */
    }
    
    .request-card:hover {
      transform: translateY(-8px);
      box-shadow: 0 20px 40px rgba(62, 39, 35, 0.15);
    }
    
    .badge {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 8px;
      font-size: 11px;
      font-weight: 600;
      background: rgba(200, 149, 108, 0.12);
      color: #8d6e63;
      border: 1px solid rgba(200, 149, 108, 0.2);
    }
    
    .price-tag {
      background: linear-gradient(135deg, #c8956c, #a67c52);
      color: #fffaf5;
      font-weight: 700;
      border-radius: 12px;
      padding: 8px 14px;
      font-size: 16px;
    }

    @keyframes slideInUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .animate-card { animation: slideInUp 0.5s ease-out forwards; }
  </style>
 </head>
 <body class="h-full">
  <div id="app" class="flour-bg h-full w-full flex flex-col relative overflow-auto">
   <div class="flour-dust"></div>
   <div class="wood-grain"></div>

   <nav class="sticky top-0 z-20 glass-card shadow-md">
    <div class="w-full max-w-7xl mx-auto px-6 py-6 relative z-10">
     <div class="mb-6">
      <h1 id="marketplace-title" style="font-family: 'Playfair Display', serif; color: #3e2723; font-size: 36px; font-weight: 700;">Bakery Request Marketplace</h1>
      <p id="marketplace-subtitle" style="font-family: 'DM Sans', sans-serif; color: #8d6e63; font-size: 15px;">Browse cake requests & find your next project</p>
     </div>

     <div class="mb-6">
        <label style="font-family: 'DM Sans', sans-serif; color: #3e2723; font-size: 13px; font-weight: 600; display: block; margin-bottom: 6px;">Search Requests</label>
        <div class="relative">
            <input type="text" id="search-input" placeholder="Search by title or description..." 
                   style="width: 100%; padding: 12px 14px; border: 1px solid rgba(200, 149, 108, 0.3); border-radius: 10px; color: #3e2723; font-size: 14px; background: rgba(255,255,255,0.6);">
        </div>
     </div>

     <div class="grid grid-cols-2 gap-4">
      <div>
        <label style="font-family: 'DM Sans', sans-serif; color: #3e2723; font-size: 13px; font-weight: 600; display: block; margin-bottom: 6px;">Filter by Variety</label>
        <select id="filter-select" style="width: 100%; padding: 10px 14px; border: 1px solid rgba(200, 149, 108, 0.3); border-radius: 10px; color: #3e2723; font-size: 13px; background: rgba(255,255,255,0.6);">
            <option value="">All Varieties</option>
            <option value="wedding-cake">Wedding Cake</option>
            <option value="birthday-cake">Birthday Cake</option>
            <option value="bread">Bread</option>
            <option value="cookies">Cookies</option>
            <option value="pastry">Pastry</option>
        </select>
      </div>
      <div>
        <label style="font-family: 'DM Sans', sans-serif; color: #3e2723; font-size: 13px; font-weight: 600; display: block; margin-bottom: 6px;">Sort by</label>
        <select id="sort-select" style="width: 100%; padding: 10px 14px; border: 1px solid rgba(200, 149, 108, 0.3); border-radius: 10px; color: #3e2723; font-size: 13px; background: rgba(255,255,255,0.6);">
            <option value="newest">Newest First</option>
            <option value="budget-high">Highest Budget</option>
            <option value="budget-low">Lowest Budget</option>
        </select>
      </div>
     </div>
    </div>
   </nav>

   <div class="flex-1 w-full max-w-7xl mx-auto px-6 py-8 relative z-10">
    <div id="requests-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
   </div>
  </div>

  <script>
    const mockRequests = [
      { id: 1, title: "Elegant Wedding Cake", variety: "wedding-cake", budget: 450, deadline: "2024-03-15", description: "Three-tier wedding cake with delicate floral design", image: "🎂" },
      { id: 2, title: "Chocolate Birthday Cake", variety: "birthday-cake", budget: 80, deadline: "2024-02-20", description: "Rich chocolate cake with ganache", image: "🍰" },
      { id: 3, title: "Sourdough Bread Loaves", variety: "bread", budget: 45, deadline: "2024-02-18", description: "Traditional crusty sourdough", image: "🍞" },
      { id: 4, title: "Rainbow Assorted Cookies", variety: "cookies", budget: 120, deadline: "2024-02-22", description: "Colorful sugar cookies", image: "🍪" },
      { id: 5, title: "Classic French Pastry", variety: "pastry", budget: 60, deadline: "2024-03-01", description: "Handmade croissants and danishes", image: "🥐" }
    ];

    let filteredData = [...mockRequests];

    function renderCards() {
      const grid = document.getElementById('requests-grid');
      grid.innerHTML = '';
      
      if (filteredData.length === 0) {
        grid.innerHTML = '<p class="col-span-full text-center py-10" style="color: #fffaf5; font-family: DM Sans;">No matching requests found.</p>';
        return;
      }

      filteredData.forEach((req, index) => {
        const card = document.createElement('div');
        card.className = 'request-card animate-card rounded-2xl overflow-hidden p-5';
        card.style.animationDelay = `${index * 0.1}s`;
        
        card.innerHTML = `
          <div style="height: 140px; display: flex; align-items: center; justify-content: center; font-size: 60px; background: rgba(200, 149, 108, 0.05); border-radius: 12px; margin-bottom: 15px;">${req.image}</div>
          <div class="flex justify-between items-start mb-3">
            <h3 style="font-family: Playfair Display; color: #3e2723; font-size: 18px; font-weight: 600;">${req.title}</h3>
            <div class="price-tag">$${req.budget}</div>
          </div>
          <p style="font-family: DM Sans; color: #8d6e63; font-size: 13px; margin-bottom: 15px;">${req.description}</p>
          <div class="flex justify-between items-center">
            <span class="badge">${req.variety.replace('-', ' ')}</span>
            <button style="background: #c8956c; color: white; padding: 6px 14px; border-radius: 8px; font-size: 12px; font-weight: 600;">View Details</button>
          </div>
        `;
        grid.appendChild(card);
      });
    }

    function applyAllFilters() {
      const search = document.getElementById('search-input').value.toLowerCase();
      const variety = document.getElementById('filter-select').value;
      const sort = document.getElementById('sort-select').value;

      filteredData = mockRequests.filter(req => {
        const matchesSearch = req.title.toLowerCase().includes(search) || req.description.toLowerCase().includes(search);
        const matchesVariety = !variety || req.variety === variety;
        return matchesSearch && matchesVariety;
      });

      if (sort === 'budget-high') filteredData.sort((a, b) => b.budget - a.budget);
      else if (sort === 'budget-low') filteredData.sort((a, b) => a.budget - b.budget);
      else filteredData.sort((a, b) => b.id - a.id);

      renderCards();
    }

    document.addEventListener('DOMContentLoaded', () => {
      document.getElementById('search-input').oninput = applyAllFilters;
      document.getElementById('filter-select').onchange = applyAllFilters;
      document.getElementById('sort-select').onchange = applyAllFilters;
      applyAllFilters();
    });
  </script>
 </body>
</html>
