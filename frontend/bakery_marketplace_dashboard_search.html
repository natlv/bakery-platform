<!doctype html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart Bakers — Marketplace</title>
  <script src="master_controller.js"></script>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    html,body{height:100%;margin:0;}*{box-sizing:border-box;}
    .flour-bg{background:radial-gradient(ellipse at 20% 50%,rgba(255,248,240,.15) 0%,transparent 50%),radial-gradient(ellipse at 80% 20%,rgba(210,180,140,.1) 0%,transparent 40%),linear-gradient(135deg,#3e2723 0%,#4e342e 25%,#5d4037 50%,#4e342e 75%,#3e2723 100%);}
    .flour-dust{position:fixed;inset:0;opacity:.1;pointer-events:none;background-image:radial-gradient(circle at 15% 25%,#fff 1px,transparent 1px),radial-gradient(circle at 45% 15%,#fff .5px,transparent .5px),radial-gradient(circle at 75% 35%,#fff 1.5px,transparent 1.5px),radial-gradient(circle at 85% 75%,#fff 1px,transparent 1px);}
    .glass{background:rgba(255,252,247,.92);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.6);}
    .inp{padding:10px 14px;border:1px solid rgba(200,149,108,.3);border-radius:10px;font-family:'DM Sans',sans-serif;color:#3e2723;font-size:13px;background:rgba(255,255,255,.7);outline:none;transition:all .2s;width:100%;}
    .inp:focus{border-color:#c8956c;box-shadow:0 0 0 3px rgba(200,149,108,.1);}
    .request-card{background:rgba(255,252,247,.96);border:1px solid rgba(200,149,108,.18);border-radius:20px;overflow:hidden;transition:all .35s cubic-bezier(.34,1.56,.64,1);cursor:pointer;}
    .request-card:hover{transform:translateY(-8px);box-shadow:0 24px 48px rgba(62,39,35,.16);border-color:rgba(200,149,108,.4);}
    .badge{display:inline-block;padding:4px 10px;border-radius:8px;font-size:11px;font-weight:600;background:rgba(200,149,108,.12);color:#8d6e63;border:1px solid rgba(200,149,108,.2);font-family:'DM Sans',sans-serif;}
    .price-tag{background:linear-gradient(135deg,#c8956c,#a67c52);color:#fffaf5;font-weight:700;border-radius:10px;padding:7px 13px;font-size:15px;font-family:'DM Sans',sans-serif;}
    .bid-btn{width:100%;padding:11px;background:linear-gradient(135deg,#c8956c,#a67c52);color:#fffaf5;border:none;border-radius:11px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;}
    .bid-btn:hover{transform:translateY(-1px);box-shadow:0 6px 16px rgba(200,149,108,.3);}
    .sort-chip{padding:6px 14px;border-radius:20px;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:600;cursor:pointer;border:1px solid rgba(200,149,108,.3);transition:all .2s;background:transparent;color:#8d6e63;}
    .sort-chip.active{background:linear-gradient(135deg,#c8956c,#a67c52);color:#fffaf5;border-color:transparent;}
    @keyframes slideUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
    .slide-up{animation:slideUp .45s ease-out both;}
    .diet-tag{display:inline-block;padding:3px 8px;border-radius:6px;font-size:10px;font-weight:600;background:rgba(107,143,94,.1);color:#4a7c3f;border:1px solid rgba(107,143,94,.2);font-family:'DM Sans',sans-serif;}
  </style>
</head>
<body class="h-full">
<div class="flour-bg h-full w-full flex flex-col relative overflow-auto">
  <div class="flour-dust"></div>

  <!-- Nav -->
  <nav data-sb-nav class="glass sticky top-0 z-20 shadow-sm" style="padding:16px 24px;display:flex;align-items:center;justify-content:space-between;position:relative;"></nav>

  <!-- Page Content -->
  <div class="flex-1 w-full max-w-7xl mx-auto px-6 py-8 relative z-10">

    <div style="margin-bottom:24px;">
      <h1 style="font-family:'Playfair Display',serif;color:#fffaf5;font-size:34px;font-weight:700;margin:0 0 6px;">Bakery Request Marketplace</h1>
      <p style="font-family:'DM Sans',sans-serif;color:rgba(255,250,245,.6);font-size:15px;margin:0 0 16px;">Browse open requests and place your best bid</p>
      <!-- Baker quick-action banner -->
      <div style="display:flex;gap:10px;align-items:center;background:rgba(255,252,247,.07);border:1px solid rgba(200,149,108,.22);border-radius:14px;padding:12px 18px;">
        <span style="font-size:20px;">🧁</span>
        <span style="font-family:'DM Sans',sans-serif;color:rgba(255,250,245,.75);font-size:13px;">Showcase your speciality — update your menu so customers know what you offer.</span>
        <a href="baker_upload_items.html" style="margin-left:auto;text-decoration:none;white-space:nowrap;">
          <button style="padding:8px 16px;background:rgba(200,149,108,.22);color:#f5c89a;border:1px solid rgba(200,149,108,.4);border-radius:9px;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:700;cursor:pointer;transition:all .2s;" onmouseover="this.style.background='rgba(200,149,108,.35)'" onmouseout="this.style.background='rgba(200,149,108,.22)'">Manage My Menu →</button>
        </a>
      </div>
    </div>

    <!-- Filters -->
    <div class="glass rounded-2xl p-4 mb-5" style="display:grid;grid-template-columns:2fr 1fr 1fr;gap:12px;align-items:end;">
      <div>
        <label style="font-family:'DM Sans',sans-serif;font-size:12px;font-weight:600;color:#3e2723;display:block;margin-bottom:5px;">Search Requests</label>
        <input class="inp" id="search-inp" placeholder="Wedding cake, sourdough bread…" oninput="applyFilters()">
      </div>
      <div>
        <label style="font-family:'DM Sans',sans-serif;font-size:12px;font-weight:600;color:#3e2723;display:block;margin-bottom:5px;">Variety</label>
        <select class="inp" id="variety-filter" onchange="applyFilters()">
          <option value="">All Varieties</option>
          <option value="wedding-cake">Wedding Cake</option>
          <option value="birthday-cake">Birthday Cake</option>
          <option value="bread">Bread</option>
          <option value="cookies">Cookies</option>
          <option value="pastry">Pastry</option>
          <option value="cupcakes">Cupcakes</option>
        </select>
      </div>
      <div>
        <label style="font-family:'DM Sans',sans-serif;font-size:12px;font-weight:600;color:#3e2723;display:block;margin-bottom:5px;">Budget</label>
        <select class="inp" id="budget-filter" onchange="applyFilters()">
          <option value="">Any Budget</option>
          <option value="0-50">Under $50</option>
          <option value="50-100">$50 – $100</option>
          <option value="100-300">$100 – $300</option>
          <option value="300+">$300+</option>
        </select>
      </div>
    </div>

    <!-- Sort chips -->
    <div style="display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap;align-items:center;">
      <span style="font-family:'DM Sans',sans-serif;color:rgba(255,250,245,.6);font-size:13px;">Sort:</span>
      <button class="sort-chip active" onclick="setSort('newest',this)">Newest</button>
      <button class="sort-chip" onclick="setSort('budget-high',this)">Highest Budget</button>
      <button class="sort-chip" onclick="setSort('budget-low',this)">Lowest Budget</button>
      <button class="sort-chip" onclick="setSort('deadline',this)">Deadline Soon</button>
      <button class="sort-chip" onclick="setSort('fewest-bids',this)">Fewest Bids</button>
    </div>

    <p id="results-count" style="font-family:'DM Sans',sans-serif;color:rgba(255,250,245,.5);font-size:13px;margin-bottom:16px;"></p>

    <!-- Grid -->
    <div id="requests-grid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:20px;"></div>
    <p id="empty-msg" style="display:none;text-align:center;padding:60px;font-family:'DM Sans',sans-serif;color:rgba(255,250,245,.4);font-size:16px;">No requests match your search.</p>
  </div>
</div>

<script>
  let currentSort = 'newest';
  let allRequests = [];
  let filtered = [];

  function setSort(sort, el) {
    currentSort = sort;
    document.querySelectorAll('.sort-chip').forEach(c => c.classList.remove('active'));
    el.classList.add('active');
    applyFilters();
  }

  function budgetMatches(budget, filter) {
    if (!filter) return true;
    if (filter === '0-50') return budget <= 50;
    if (filter === '50-100') return budget > 50 && budget <= 100;
    if (filter === '100-300') return budget > 100 && budget <= 300;
    if (filter === '300+') return budget > 300;
    return true;
  }

  async function loadRequests() {
    const grid = document.getElementById('requests-grid');
    grid.innerHTML = '<div class="glass rounded-2xl p-6" style="grid-column:1 / -1;text-align:center;font-family:\'DM Sans\',sans-serif;color:#8d6e63;">Loading marketplace...</div>';

    try {
      const requests = await SmartBakers.api.getRequests({ status: 'open' });
      allRequests = await Promise.all(
        requests.map(async (request) => {
          const bids = await SmartBakers.api.getBids(request.request_id).catch(() => []);
          return {
            ...request,
            bidsCount: Number.isFinite(request.bid_count) ? request.bid_count : bids.length,
          };
        })
      );
      applyFilters();
    } catch (error) {
      grid.innerHTML = `<div class="glass rounded-2xl p-6" style="grid-column:1 / -1;text-align:center;font-family:'DM Sans',sans-serif;color:#c62828;">${SmartBakers.utils.escHtml(error.message || 'Could not load the marketplace.')}</div>`;
    }
  }

  function applyFilters() {
    const search  = document.getElementById('search-inp').value.toLowerCase();
    const variety = document.getElementById('variety-filter').value;
    const budget  = document.getElementById('budget-filter').value;

    filtered = allRequests.filter(request => {
      const matchSearch  = request.title.toLowerCase().includes(search) || request.details.toLowerCase().includes(search);
      const matchVariety = !variety || request.variety === variety;
      const matchBudget  = budgetMatches(Number(request.budget || 0), budget);
      return matchSearch && matchVariety && matchBudget;
    });

    if (currentSort === 'newest')      filtered.sort((a,b) => new Date(b.created_at || 0) - new Date(a.created_at || 0) || b.request_id - a.request_id);
    if (currentSort === 'budget-high') filtered.sort((a,b) => Number(b.budget || 0) - Number(a.budget || 0));
    if (currentSort === 'budget-low')  filtered.sort((a,b) => Number(a.budget || 0) - Number(b.budget || 0));
    if (currentSort === 'deadline')    filtered.sort((a,b) => new Date(a.deadline || 0) - new Date(b.deadline || 0));
    if (currentSort === 'fewest-bids') filtered.sort((a,b) => Number(a.bidsCount || 0) - Number(b.bidsCount || 0));

    document.getElementById('results-count').textContent = `Showing ${filtered.length} request${filtered.length !== 1 ? 's' : ''}`;
    renderCards();
  }

  function renderCards() {
    const grid  = document.getElementById('requests-grid');
    const empty = document.getElementById('empty-msg');
    grid.innerHTML = '';

    if (!filtered.length) {
      empty.style.display = 'block';
      return;
    }

    empty.style.display = 'none';

    filtered.forEach((request, index) => {
      const card = document.createElement('div');
      card.className = 'request-card slide-up';
      card.style.animationDelay = `${index * 0.07}s`;

      const daysLeft = SmartBakers.utils.daysUntil(request.deadline);
      const urgency = daysLeft !== null && daysLeft <= 3 ? '#e53935' : daysLeft !== null && daysLeft <= 7 ? '#e08a2e' : '#a1887f';
      const requestUrl = SmartBakers.routing.requestUrl('bakers_splitscreen_bidpage.html', request.request_id);

      card.innerHTML = `
        <div style="height:130px;display:flex;align-items:center;justify-content:center;font-size:64px;background:linear-gradient(135deg,rgba(200,149,108,.08),rgba(210,180,140,.06));overflow:hidden;">
          ${request.image_url ? `<img src="${SmartBakers.utils.escHtml(request.image_url)}" alt="" style="width:100%;height:100%;object-fit:cover;">` : request.emoji}
        </div>
        <div style="padding:18px;">
          <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;">
            <h3 style="font-family:'Playfair Display',serif;color:#3e2723;font-size:17px;font-weight:600;margin:0;flex:1;margin-right:10px;">${SmartBakers.utils.escHtml(request.title)}</h3>
            <div class="price-tag">${SmartBakers.utils.formatCurrency(request.budget)}</div>
          </div>

          <p style="font-family:'DM Sans',sans-serif;color:#8d6e63;font-size:13px;margin:0 0 12px;line-height:1.5;">${SmartBakers.utils.escHtml(request.details)}</p>

          <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px;">
            <span class="badge">${SmartBakers.utils.escHtml(SmartBakers.utils.sentenceCase(request.variety))}</span>
            ${request.dietary.map(item => `<span class="diet-tag">${SmartBakers.utils.escHtml(item)}</span>`).join('')}
          </div>

          <div style="display:flex;justify-content:space-between;margin-bottom:14px;">
            <span style="font-family:'DM Sans',sans-serif;font-size:12px;color:${urgency};">📅 ${daysLeft === null ? 'Flexible deadline' : daysLeft > 0 ? `${daysLeft} days left` : 'Due now'}</span>
            <span style="font-family:'DM Sans',sans-serif;font-size:12px;color:#a1887f;">🏷️ ${request.bidsCount} bid${request.bidsCount !== 1 ? 's' : ''}</span>
          </div>

          <a href="${requestUrl}" onclick="SmartBakers.routing.setActiveRequest(${request.request_id})">
            <button class="bid-btn">Place My Bid →</button>
          </a>
        </div>
      `;
      grid.appendChild(card);
    });
  }

  document.addEventListener('DOMContentLoaded', loadRequests);
</script>
</body>
</html>
